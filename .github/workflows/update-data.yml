name: 更新预定利率研究值数据并部署

on:
  schedule:
    - cron: '45 10 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 更新模型数据
        env:
          START_DATE: '2025-01-01'
          FETCH_WORKERS: '8'
        run: python scripts/update_model_data.py

      - name: 提交数据变化
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/model-data.json data/model-data.js data/deposit-rate-events.json data/lpr-events.json data/actual-reference-values.json
          if git diff --cached --quiet; then
            echo "数据无变化"
          else
            git commit -m "自动更新预定利率研究值数据"
            git push
          fi

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 上传站点文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
